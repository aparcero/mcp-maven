[env]
_.file = ".env"

[tools]
golang = "1.26"

[tasks.build]
description = "Build the mcp-maven binary"
run = "mkdir -p bin && go build -o bin/mcp-maven ./cmd/mcp-maven"

[tasks.run]
description = "Run the server in STDIO mode"
run = "go run ./cmd/mcp-maven"

[tasks.inspector]
description = "Run the server with the MCP Inspector"
run = "npx -y @modelcontextprotocol/inspector go run ./cmd/mcp-maven"

[tasks.inspector-http]
description = "Run the HTTP server with the MCP Inspector"
run = """
port="${MCP_MAVEN_INSPECTOR_HTTP_PORT:-${HTTP_PORT:-8080}}"
go run ./cmd/mcp-maven -http -port "$port" &
server_pid=$!

cleanup() {
  kill "$server_pid" 2>/dev/null || true
  wait "$server_pid" 2>/dev/null || true
}
trap cleanup EXIT INT TERM

for _ in $(seq 1 60); do
  if curl -fsS "http://127.0.0.1:${port}/health/live" >/dev/null; then
    break
  fi
  if ! kill -0 "$server_pid" 2>/dev/null; then
    wait "$server_pid"
    exit 1
  fi
  sleep 0.5
done

if ! curl -fsS "http://127.0.0.1:${port}/health/live" >/dev/null; then
  echo "HTTP server did not become ready on port ${port}" >&2
  exit 1
fi

npx -y @modelcontextprotocol/inspector --transport http --server-url "http://127.0.0.1:${port}/mcp"
"""

[tasks.test]
description = "Run unit tests only (excludes integration tests)"
run = "go test -short -v ./..."

[tasks.test-unit]
description = "Run unit tests only (alias for test)"
run = "go test -short -v ./..."

[tasks.test-integration]
description = "Run integration tests only"
run = "go test -count=1 -run Integration -v ./..."

[tasks.test-integration-live]
description = "Run live Maven Central integration tests"
run = "MCP_MAVEN_LIVE_TESTS=1 go test -count=1 -run Integration -v ./..."

[tasks.test-coverage]
description = "Run tests with coverage"
run = """
go test -coverprofile=coverage.out -covermode=atomic ./...
go tool cover -html=coverage.out -o coverage.html
"""

[tasks.test-race]
description = "Run tests with the Go race detector"
run = "go test -race ./..."

[tasks.clean]
description = "Clean build artifacts"
run = "rm -rf bin/mcp-maven coverage.out coverage.html"

[tasks.fmt]
description = "Format Go code"
run = "gofmt -w ."

[tasks.lint]
description = "Run golangci-lint"
run = "go tool golangci-lint run ./..."

[tasks.vulncheck]
description = "Run Go vulnerability checks"
run = "go tool govulncheck ./..."

[tasks.secret-scan]
description = "Scan tracked files for high-confidence secret patterns"
run = """
if git grep -n -I -E 'BEGIN (RSA|DSA|EC|OPENSSH|PRIVATE) KEY|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9_]{36}|github_pat_[A-Za-z0-9_]{82,}|xox[baprs]-[A-Za-z0-9-]{10,}|sk-[A-Za-z0-9]{20,}' -- . ':!go.sum'; then
  echo "Potential secrets found in tracked files" >&2
  exit 1
fi
"""

[tasks.tidy]
description = "Tidy go.mod"
run = "go mod tidy"

[tasks.check]
description = "Run release-readiness checks"
run = """
mise run tidy
mise run test
mise run test-integration
mise run test-race
mise run lint
mise run vulncheck
mise run secret-scan
mise run build
"""

[tasks.ci]
description = "CI gate: release-readiness checks without verbose output or test cache"
run = """
go mod tidy
go test -count=1 ./...
go tool golangci-lint run ./...
go tool govulncheck ./...
go build ./cmd/mcp-maven
"""
